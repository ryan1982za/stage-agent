name: Build and Push Gaia MCP Docker Image

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - "**"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    test:
        name: Lint, Build, and Test
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Restore
              run: dotnet restore "Stage Agent.sln"

            - name: Format check
              run: dotnet format "Stage Agent.sln" --verify-no-changes

            - name: Build
              run: dotnet build "Stage Agent.sln" --no-restore

            - name: Test
              run: dotnet test "Stage Agent.sln" --no-build --verbosity normal

    build-and-push:
        name: Build and Push Gaia MCP
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: test
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push Gaia MCP image
              uses: docker/build-push-action@v5
              with:
                  context: .github/mcp
                  file: .github/mcp/Dockerfile
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/gaia-mcp:latest
                      ${{ secrets.DOCKERHUB_USERNAME }}/gaia-mcp:${{ github.sha }}
