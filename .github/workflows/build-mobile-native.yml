name: Build Mobile Native (No EAS)

on:
    workflow_dispatch:
        inputs:
            platform:
                description: Which platform(s) to build
                required: true
                type: choice
                default: ios
                options:
                    - ios
                    - android
                    - both
            upload_ios_to_app_store_connect:
                description: Upload production iOS IPA to App Store Connect
                required: true
                type: boolean
                default: false
    push:
        branches:
            - main
        paths:
            - mobile/ios-app/**
            - .github/workflows/build-mobile-native.yml

concurrency:
    group: native-mobile-build-${{ github.ref }}
    cancel-in-progress: false

jobs:
    ios-native:
        name: Native iOS Build
        runs-on: macos-latest
        if: |
            github.event_name == 'push' ||
            (github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'both'))
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Select latest stable Xcode
              uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: latest-stable

            - name: Run StageDesignerCore tests
              working-directory: ./mobile/ios-app/StageDesignerCore
              run: |
                  swift --version
                  swift test

            - name: Generate iOS Xcode project
              if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_ios_to_app_store_connect }}
              working-directory: ./mobile/ios-app/StageDesignerApp
              run: |
                  if ! command -v xcodegen >/dev/null 2>&1; then
                    brew update
                    brew install xcodegen
                  fi

                  xcodegen generate

            - name: Locate iOS app project/workspace
              if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_ios_to_app_store_connect }}
              id: ios-project
              working-directory: ./mobile/ios-app/StageDesignerApp
              run: |
                  workspace=$(find . -maxdepth 3 -name "*.xcworkspace" | head -n 1)
                  project=$(find . -maxdepth 3 -name "*.xcodeproj" | head -n 1)

                  if [ -n "$workspace" ]; then
                    echo "kind=workspace" >> "$GITHUB_OUTPUT"
                    echo "path=$workspace" >> "$GITHUB_OUTPUT"
                  elif [ -n "$project" ]; then
                    echo "kind=project" >> "$GITHUB_OUTPUT"
                    echo "path=$project" >> "$GITHUB_OUTPUT"
                  else
                    echo "No .xcworkspace or .xcodeproj found under mobile/ios-app/StageDesignerApp."
                    echo "Ensure project.yml exists and xcodegen generate runs successfully before App Store upload."
                    exit 1
                  fi

            - name: Validate iOS signing secrets
              if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_ios_to_app_store_connect }}
              env:
                  IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
                  IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
                  IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  IOS_BUNDLE_IDENTIFIER: ${{ vars.IOS_BUNDLE_IDENTIFIER || 'com.stage.agent.mobile' }}
                  APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
                  APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
                  APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
              run: |
                  required=(
                    IOS_DIST_CERT_P12_BASE64
                    IOS_DIST_CERT_PASSWORD
                    IOS_PROVISIONING_PROFILE_BASE64
                    APPLE_TEAM_ID
                    IOS_BUNDLE_IDENTIFIER
                    APP_STORE_CONNECT_KEY_ID
                    APP_STORE_CONNECT_ISSUER_ID
                    APP_STORE_CONNECT_PRIVATE_KEY
                  )

                  missing=0
                  for secret_name in "${required[@]}"; do
                    if [ -z "${!secret_name}" ]; then
                      echo "Missing required value: ${secret_name}"
                      missing=1
                    fi
                  done

                  if [ "$missing" -ne 0 ]; then
                    exit 1
                  fi

            - name: Import iOS distribution certificate
              if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_ios_to_app_store_connect }}
              uses: apple-actions/import-codesign-certs@v3
              with:
                  p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
                  p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

            - name: Install provisioning profile
              if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_ios_to_app_store_connect }}
              env:
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  IOS_BUNDLE_IDENTIFIER: ${{ vars.IOS_BUNDLE_IDENTIFIER || 'com.stage.agent.mobile' }}
              run: |
                  mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
                  echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -D > "$HOME/Library/MobileDevice/Provisioning Profiles/release.mobileprovision"

                  profile_decoded="$(mktemp)"
                  security cms -D -i "$HOME/Library/MobileDevice/Provisioning Profiles/release.mobileprovision" > "$profile_decoded"

                  profile_uuid=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$profile_decoded")
                  profile_name=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$profile_decoded")

                  mv "$HOME/Library/MobileDevice/Provisioning Profiles/release.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/${profile_uuid}.mobileprovision"

                  echo "PROFILE_UUID=${profile_uuid}" >> "$GITHUB_ENV"
                  echo "PROFILE_NAME=${profile_name}" >> "$GITHUB_ENV"

                  profile_app_id=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$profile_decoded")
                  expected_app_id="${APPLE_TEAM_ID}.${IOS_BUNDLE_IDENTIFIER}"
                  wildcard_app_id="${APPLE_TEAM_ID}.*"

                  if [ "$profile_app_id" != "$expected_app_id" ] && [ "$profile_app_id" != "$wildcard_app_id" ]; then
                    echo "Provisioning profile app ID '$profile_app_id' does not match expected '$expected_app_id'."
                    echo "Upload a profile for bundle identifier '${IOS_BUNDLE_IDENTIFIER}' and retry."
                    exit 1
                  fi

            - name: Detect iOS scheme
              if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_ios_to_app_store_connect }}
              id: ios-scheme
              working-directory: ./mobile/ios-app/StageDesignerApp
              run: |
                  if [ "${{ steps.ios-project.outputs.kind }}" = "workspace" ]; then
                    scheme=$(xcodebuild -workspace "${{ steps.ios-project.outputs.path }}" -list | awk '/Schemes:/{getline; gsub(/^[ \t]+/, ""); print; exit}')
                  else
                    scheme=$(xcodebuild -project "${{ steps.ios-project.outputs.path }}" -list | awk '/Schemes:/{getline; gsub(/^[ \t]+/, ""); print; exit}')
                  fi

                  if [ -z "$scheme" ]; then
                    echo "No Xcode scheme discovered for iOS project."
                    exit 1
                  fi

                  echo "name=$scheme" >> "$GITHUB_OUTPUT"

            - name: Archive iOS app (App Store)
              if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_ios_to_app_store_connect }}
              working-directory: ./mobile/ios-app/StageDesignerApp
              env:
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: |
                  archive_args=(
                    -scheme "${{ steps.ios-scheme.outputs.name }}"
                    -configuration Release
                    -archivePath build/App.xcarchive
                    archive
                    DEVELOPMENT_TEAM="$APPLE_TEAM_ID"
                    CODE_SIGN_STYLE=Manual
                    CODE_SIGN_IDENTITY="Apple Distribution"
                    PROVISIONING_PROFILE="$PROFILE_UUID"
                    PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"
                  )

                  if [ "${{ steps.ios-project.outputs.kind }}" = "workspace" ]; then
                    xcodebuild -workspace "${{ steps.ios-project.outputs.path }}" "${archive_args[@]}"
                  else
                    xcodebuild -project "${{ steps.ios-project.outputs.path }}" "${archive_args[@]}"
                  fi

            - name: Export signed IPA
              if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_ios_to_app_store_connect }}
              working-directory: ./mobile/ios-app/StageDesignerApp
              env:
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  IOS_BUNDLE_IDENTIFIER: ${{ vars.IOS_BUNDLE_IDENTIFIER || 'com.stage.agent.mobile' }}
              run: |
                  cat > ExportOptions.plist <<EOF
                  <?xml version="1.0" encoding="UTF-8"?>
                  <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                  <plist version="1.0">
                  <dict>
                    <key>method</key>
                    <string>app-store</string>
                    <key>signingStyle</key>
                    <string>manual</string>
                    <key>teamID</key>
                    <string>${APPLE_TEAM_ID}</string>
                    <key>provisioningProfiles</key>
                    <dict>
                      <key>${IOS_BUNDLE_IDENTIFIER}</key>
                      <string>${PROFILE_NAME}</string>
                    </dict>
                  </dict>
                  </plist>
                  EOF

                  xcodebuild -exportArchive \
                    -archivePath build/App.xcarchive \
                    -exportPath build/export \
                    -exportOptionsPlist ExportOptions.plist

                  ipa_path=$(find "$PWD/build/export" -name "*.ipa" | head -n 1)
                  if [ -z "$ipa_path" ]; then
                    echo "Failed to generate IPA"
                    exit 1
                  fi

                  echo "IPA_PATH=${ipa_path}" >> "$GITHUB_ENV"

            - name: Write App Store Connect API key
              if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_ios_to_app_store_connect }}
              env:
                  APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
                  APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
              run: |
                  mkdir -p "$HOME/private_keys"
                  key_path="$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

                  if [[ "$APP_STORE_CONNECT_PRIVATE_KEY" == -----BEGIN* ]]; then
                    printf "%s" "$APP_STORE_CONNECT_PRIVATE_KEY" > "$key_path"
                  else
                    echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode > "$key_path"
                  fi

                  if ! grep -q "^-----BEGIN PRIVATE KEY-----" "$key_path"; then
                    echo "APP_STORE_CONNECT_PRIVATE_KEY is not a valid .p8 private key (missing PEM header)."
                    exit 1
                  fi

                  if ! grep -q "^-----END PRIVATE KEY-----" "$key_path"; then
                    echo "APP_STORE_CONNECT_PRIVATE_KEY is not a valid .p8 private key (missing PEM footer)."
                    exit 1
                  fi

            - name: Upload IPA to App Store Connect
              if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_ios_to_app_store_connect }}
              env:
                  APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
                  APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
              run: |
                  xcrun altool \
                    --upload-app \
                    --type ios \
                    --file "$IPA_PATH" \
                    --apiKey "$APP_STORE_CONNECT_KEY_ID" \
                    --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

            - name: Upload signed iOS IPA artifact
              if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_ios_to_app_store_connect }}
              uses: actions/upload-artifact@v4
              with:
                  name: ios-ipa-${{ github.sha }}
                  path: mobile/ios-app/StageDesignerApp/build/export/*.ipa
                  if-no-files-found: error
                  retention-days: 14

            - name: iOS summary
              run: |
                  echo "## Native iOS build complete" >> "$GITHUB_STEP_SUMMARY"
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.upload_ios_to_app_store_connect }}" = "true" ]; then
                    echo "- Mode: production upload" >> "$GITHUB_STEP_SUMMARY"
                    echo "- Output: signed IPA + App Store Connect upload" >> "$GITHUB_STEP_SUMMARY"
                  else
                    echo "- Mode: iOS core validation" >> "$GITHUB_STEP_SUMMARY"
                    echo "- Output: StageDesignerCore swift test results" >> "$GITHUB_STEP_SUMMARY"
                  fi

    android-native:
        name: Native Android Build
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.platform == 'android' || inputs.platform == 'both') }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Ensure Android native project exists
              run: |
                  if [ ! -d "mobile/android" ]; then
                    echo "mobile/android does not exist yet. Android native pipeline is pending scaffold."
                    exit 1
                  fi

            - name: Setup JDK
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"

            - name: Build Android APK (release)
              working-directory: ./mobile/android
              run: |
                  chmod +x gradlew
                  ./gradlew assembleRelease --no-daemon

            - name: Upload Android APK artifact
              uses: actions/upload-artifact@v4
              with:
                  name: android-apk-${{ github.sha }}
                  path: mobile/android/app/build/outputs/apk/release/*.apk
                  if-no-files-found: error
                  retention-days: 14
