name: StageDesignerApp
options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    PRODUCT_NAME: Stage Agent
    PRODUCT_BUNDLE_IDENTIFIER: com.stage.agent.mobile
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_FILE: App/Info.plist
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: false
packages:
  StageDesignerCore:
    path: ../StageDesignerCore
targets:
  StageDesignerApp:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Features
      - path: Infrastructure
      - path: ../../../docs/contracts/sqlite-schema-v1.sql
        buildPhase: resources
    dependencies:
      - package: StageDesignerCore
        product: StageDesignerApplication
      - package: StageDesignerCore
        product: StageDesignerDomain
      - package: StageDesignerCore
        product: StageDesignerPersistence
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
schemes:
  StageDesignerApp:
    build:
      targets:
        StageDesignerApp: all
    run:
      config: Debug
    archive:
      config: Release
